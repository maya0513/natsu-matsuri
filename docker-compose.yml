services:
  postgres:
    image: postgres:16-alpine
    container_name: fooweb-postgres
    environment:
      POSTGRES_USER: fooweb
      POSTGRES_PASSWORD: fooweb_dev_password
      POSTGRES_DB: fooweb_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fooweb']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
